<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cason Heritage — Open Graph Image (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap">
<style>
  :root {
    --parchment: #f4ede4;
    --cream: #faf6f0;
    --ink: #2c1810;
    --faded: #7a6e62;
    --rust: #8b4513;
    --gold: #9a7b2d;
    --gold-bright: #d4a825;
    --deep-blue: #1a2744;
    --blood: #6b1d1d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--deep-blue);
    color: var(--cream);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 90px;
    text-align: center;
  }
  .frame {
    position: absolute;
    top: 32px;
    left: 32px;
    right: 32px;
    bottom: 32px;
    border: 2px solid var(--gold);
    border-radius: 6px;
    pointer-events: none;
    opacity: 0.85;
  }
  .frame-inner {
    position: absolute;
    top: 40px;
    left: 40px;
    right: 40px;
    bottom: 40px;
    border: 1px solid rgba(196, 154, 60, 0.35);
    border-radius: 3px;
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 26px;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900;
    font-size: 124px;
    line-height: 1.05;
    letter-spacing: 0.02em;
    color: var(--cream);
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55);
    margin-bottom: 8px;
  }
  .subtitle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 32px;
  }
  .divider {
    color: var(--gold-bright);
    font-size: 32px;
    letter-spacing: 0.6em;
    margin-bottom: 30px;
    opacity: 0.9;
  }
  .tagline {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-size: 30px;
    line-height: 1.45;
    color: rgba(244, 237, 228, 0.88);
    max-width: 880px;
    margin-bottom: 36px;
  }
  .tagline em {
    font-style: normal;
    color: var(--gold-bright);
    font-weight: 600;
  }
  .dates {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-bright);
    opacity: 1;
  }
  .url {
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.45em;
    text-transform: lowercase;
    color: var(--rust);
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="frame-inner"></div>

  <div class="eyebrow">Into the Unknown</div>
  <h1>The Cason Line</h1>
  <div class="subtitle">A Family Heritage</div>
  <div class="divider">&bull; &bull; &bull;</div>
  <p class="tagline">
    Eleven generations. <em>Four hundred years.</em><br>
    Nobody had to go. They all went anyway.
  </p>
  <div class="dates">Hertfordshire, 1608 &mdash; Titusville, 1957</div>
</body>
</html>
