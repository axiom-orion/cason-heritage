<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--deep-blue); background-image: linear-gradient(180deg, var(--deep-blue) 0%, var(--deep-blue) 85%, #1a2744 100%); height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  h1 { font-family: var(--font-display); font-weight: 900; font-size: 44px; color: var(--cream); letter-spacing: 0.04em; margin: 0 0 4px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  .sub { font-family: var(--font-sans); font-size: 13px; color: var(--gold-bright); font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
  .tag { font-family: var(--font-serif); font-style: italic; color: rgba(244,237,228,0.7); font-size: 14px; max-width: 520px; padding: 0 24px; line-height: 1.55; }
  .dates { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.3em; color: var(--gold-bright); opacity: 0.8; margin-top: 12px; }
</style></head>
<body>
  <h1>Into the Unknown</h1>
  <div class="sub">The Cason Line</div>
  <div class="tag">A man left England with nothing. His grandson was orphaned at ten. Their descendant walked into Florida at sixty. Eleven generations. The inheritance is the willingness to move.</div>
  <div class="dates">HERTFORDSHIRE, 1608 — TITUSVILLE, 1957</div>
</body></html>
