<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--parchment); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat { background: var(--cream); border: 1px solid rgba(139,69,19,0.15); border-radius: 10px; padding: 18px 12px; text-align: center; box-shadow: 0 2px 12px rgba(44,24,16,0.05); }
  .num { font-family: var(--font-display); font-weight: 900; font-size: 32px; color: var(--blood); line-height: 1; }
  .label { font-family: var(--font-sans); font-size: 11px; color: var(--faded); margin-top: 8px; line-height: 1.35; }
</style></head>
<body>
  <div class="grid">
    <div class="stat"><div class="num">7th FL</div><div class="label">Florida Infantry, Army of Tennessee</div></div>
    <div class="stat"><div class="num">Lt.</div><div class="label">Ransom 2's rank, 1862–1865</div></div>
    <div class="stat"><div class="num">3 yrs</div><div class="label">Away from Alachua County</div></div>
    <div class="stat"><div class="num">&lt;100</div><div class="label">Effective men at Bentonville, 1865</div></div>
  </div>
</body></html>
