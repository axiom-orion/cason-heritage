<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--parchment); }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); margin: 0 0 14px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 86px; height: 56px; background: var(--cream); border: 1px solid var(--border-medium); }
  .name { font-family: var(--font-sans); font-size: 11px; font-weight: 700; color: var(--ink); }
  .num { font-family: ui-monospace, monospace; font-size: 10px; color: var(--faded); }
</style></head>
<body>
  <div class="label">Corner radii — nothing fully rounded except dots</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0;"></div><div class="name">none</div><div class="num">0</div></div>
    <div class="item"><div class="box" style="border-radius:4px;"></div><div class="name">sm</div><div class="num">4px · badges</div></div>
    <div class="item"><div class="box" style="border-radius:8px;"></div><div class="name">md</div><div class="num">8px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:10px;"></div><div class="name">lg</div><div class="num">10px · raised</div></div>
    <div class="item"><div class="box" style="border-radius:12px;"></div><div class="name">xl</div><div class="num">12px · map</div></div>
  </div>
</body></html>
