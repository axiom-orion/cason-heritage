<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--parchment); display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat { background: var(--cream); border: 1px solid var(--border-hairline); border-radius: 10px; padding: 18px 12px; text-align: center; }
  .num { font-family: var(--font-display); font-weight: 900; font-size: 36px; color: var(--blood); line-height: 1; }
  .label { font-family: var(--font-sans); font-size: 11px; color: var(--faded); margin-top: 8px; line-height: 1.35; }
</style></head>
<body>
  <div class="stat"><div class="num">80%</div><div class="label">Mortality, first generation of Virginia settlers</div></div>
  <div class="stat"><div class="num">28,170</div><div class="label">Pounds of tobacco, Thomas Sr.'s estate, 1651</div></div>
  <div class="stat"><div class="num">450</div><div class="label">Acres via headright — James, the orphan</div></div>
  <div class="stat"><div class="num">371%</div><div class="label">Brevard County growth, 1950–1960</div></div>
</body></html>
