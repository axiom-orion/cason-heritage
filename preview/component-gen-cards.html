<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--parchment); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: var(--cream); border-radius: 10px; border: 1px solid rgba(139,69,19,0.15); padding: 20px; box-shadow: 0 4px 20px rgba(44,24,16,0.08); position: relative; }
  .card.highlight { background: linear-gradient(135deg, var(--cream), #fff8ec); border: 2px solid var(--gold); }
  .eyebrow { font-family: var(--font-sans); font-size: 10.5px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--ink); margin-bottom: 2px; }
  .dates { font-family: var(--font-sans); font-size: 12px; color: var(--faded); margin-bottom: 8px; }
  .loc { font-family: var(--font-sans); font-size: 11.5px; color: var(--sea-green); font-weight: 600; margin-bottom: 6px; }
  .hint { font-family: var(--font-sans); font-size: 10.5px; color: var(--gold); letter-spacing: 0.05em; }
</style></head>
<body>
  <div class="card">
    <div class="eyebrow">Generation 7</div>
    <div class="name">James Green Cason</div>
    <div class="dates">c.1800 – 1878</div>
    <div class="loc">Alachua County, Florida</div>
    <div class="hint">+ tap to read more</div>
  </div>
  <div class="card highlight">
    <div class="eyebrow">Generation 1 — The Crossing</div>
    <div class="name">Thomas Cason Sr.</div>
    <div class="dates">bapt. 1608 – 1651</div>
    <div class="loc">Digswell, Hertfordshire → Lynnhaven Parish, Virginia</div>
    <div class="hint">+ tap to read more</div>
  </div>
</body></html>
