<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--parchment); }
  .card { background: linear-gradient(135deg, #fff8ec, #fef3e2); border-radius: 10px; border: 2px dashed var(--rust); padding: 20px; box-shadow: 0 4px 20px rgba(44,24,16,0.08); }
  .badge { display: inline-block; background: var(--rust); color: white; font-family: var(--font-sans); font-size: 10.5px; font-weight: 700; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.06em; margin-bottom: 8px; }
  .eyebrow { font-family: var(--font-sans); font-size: 10.5px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--ink); margin-bottom: 2px; }
  .dates { font-family: var(--font-sans); font-size: 12px; color: var(--faded); margin-bottom: 6px; }
  .loc { font-family: var(--font-sans); font-size: 11.5px; color: var(--sea-green); font-weight: 600; }
</style></head>
<body>
  <div class="card">
    <div class="badge">UNSOLVED — DNA NEEDED</div>
    <div class="eyebrow">Generation 5 — The Missing Link</div>
    <div class="name">James Cason (c.1727) or Henry Cason (c.1732)</div>
    <div class="dates">c.1727 — ?</div>
    <div class="loc">Pitt County, North Carolina</div>
  </div>
</body></html>
