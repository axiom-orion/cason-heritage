<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 24px; background: var(--parchment); }
  .legend { display: flex; justify-content: center; gap: 22px; flex-wrap: wrap; font-family: var(--font-sans); font-size: 13px; color: var(--faded); padding: 10px 0; }
  .legend span { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .divider { text-align: center; padding: 10px 0 4px; color: var(--gold); font-size: 18px; letter-spacing: 0.5em; }
</style></head>
<body>
  <div class="legend">
    <span><span class="dot" style="background:#d4a825"></span> Atlantic Crossing (1620s–1630s)</span>
    <span><span class="dot" style="background:#8b4513"></span> Colonial Expansion</span>
    <span><span class="dot" style="background:#2d5a4a"></span> Frontier Push</span>
    <span><span class="dot" style="background:#6b1d1d"></span> Florida Settlement</span>
  </div>
  <div class="divider">• • •</div>
</body></html>
