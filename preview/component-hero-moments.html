<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--deep-blue); }
  .strip { display: flex; padding: 22px 18px; position: relative; gap: 0; }
  .strip::before { content: ''; position: absolute; top: 50%; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(196,154,60,0.4), transparent); }
  .moment { flex: 1; text-align: center; padding: 8px 6px; position: relative; }
  .year { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--gold-bright); display: block; }
  .line { font-family: var(--font-sans); font-size: 10.5px; color: rgba(244,237,228,0.55); letter-spacing: 0.03em; display: block; margin-top: 4px; line-height: 1.3; }
  .name { font-family: var(--font-sans); font-size: 10.5px; color: rgba(244,237,228,0.35); font-style: italic; display: block; margin-top: 3px; }
</style></head>
<body>
  <div class="strip">
    <div class="moment"><span class="year">1628</span><span class="line">Crossed the Atlantic</span><span class="name">Thomas Sr.</span></div>
    <div class="moment"><span class="year">1665</span><span class="line">Orphan carries the name</span><span class="name">James</span></div>
    <div class="moment"><span class="year">1823</span><span class="line">Walked into Florida</span><span class="name">Ransom Sr.</span></div>
    <div class="moment"><span class="year">1862</span><span class="line">Marched to war</span><span class="name">Ransom II</span></div>
    <div class="moment"><span class="year">1930s</span><span class="line">13 children, $7/month</span><span class="name">Carl Columbus</span></div>
    <div class="moment"><span class="year">1957</span><span class="line">Space Coast</span><span class="name">Robert Sr.</span></div>
  </div>
</body></html>
