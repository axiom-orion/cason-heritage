<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--parchment); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .swatch { border-radius: 8px; padding: 12px; height: 100px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--font-sans); font-size: 11.5px; font-weight: 700; }
  .hex { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.85; }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); margin: 0 0 10px; }
</style></head>
<body>
  <div class="label">Heritage accents — gilt, rust, midnight, frontier, blood</div>
  <div class="row">
    <div class="swatch" style="background:#9a7b2d;color:#faf6f0;"><div class="name">Gold</div><div class="hex">#9a7b2d</div></div>
    <div class="swatch" style="background:#d4a825;color:#2c1810;"><div class="name">Gold Bright</div><div class="hex">#d4a825</div></div>
    <div class="swatch" style="background:#8b4513;color:#faf6f0;"><div class="name">Rust</div><div class="hex">#8b4513</div></div>
    <div class="swatch" style="background:#1a2744;color:#d4a825;"><div class="name">Deep Blue</div><div class="hex">#1a2744</div></div>
    <div class="swatch" style="background:#2d5a4a;color:#faf6f0;"><div class="name">Sea Green</div><div class="hex">#2d5a4a</div></div>
    <div class="swatch" style="background:#6b1d1d;color:#faf6f0;"><div class="name">Blood</div><div class="hex">#6b1d1d</div></div>
  </div>
</body></html>
