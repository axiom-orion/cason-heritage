<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--parchment); }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); margin: 0 0 14px; }
  .row { display: flex; gap: 6px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--rust); border-radius: 3px; }
  .num { font-family: ui-monospace, monospace; font-size: 10px; color: var(--faded); }
  .name { font-family: var(--font-sans); font-size: 10px; font-weight: 700; color: var(--ink); }
</style></head>
<body>
  <div class="label">Spacing scale — 8pt base, paper-margin generous</div>
  <div class="row">
    <div class="step"><div class="bar" style="width:24px;height:4px;"></div><div class="name">1</div><div class="num">4px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:8px;"></div><div class="name">2</div><div class="num">8px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:12px;"></div><div class="name">3</div><div class="num">12px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:16px;"></div><div class="name">4</div><div class="num">16px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:24px;"></div><div class="name">5</div><div class="num">24px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:32px;"></div><div class="name">6</div><div class="num">32px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:48px;"></div><div class="name">7</div><div class="num">48px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:64px;"></div><div class="name">8</div><div class="num">64px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:80px;"></div><div class="name">9</div><div class="num">80px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:96px;"></div><div class="name">10</div><div class="num">96px</div></div>
  </div>
</body></html>
