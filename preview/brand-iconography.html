<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--parchment); display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: center; }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); }
  .group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .glyph { font-family: var(--font-serif); font-size: 28px; color: var(--gold); letter-spacing: 0.3em; }
  .small { font-family: var(--font-sans); font-size: 10.5px; color: var(--faded); }
  .arrow { font-family: var(--font-display); font-style: italic; color: var(--rust); font-size: 20px; }
  .chev { width: 24px; height: 24px; stroke: var(--gold-bright); fill: none; stroke-width: 2; stroke-linecap: round; }
  .chev-bg { background: var(--deep-blue); padding: 14px 20px; border-radius: 8px; }
</style></head>
<body>
  <div class="group">
    <div class="glyph">• • •</div>
    <div class="label">Section divider</div>
    <div class="small">bullets, wide-tracked, gold</div>
  </div>
  <div class="group">
    <div class="arrow">England → Virginia</div>
    <div class="label">Migration arrow</div>
    <div class="small">→ glyph in headlines</div>
  </div>
  <div class="group">
    <div class="chev-bg"><svg class="chev" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>
    <div class="label">Scroll-hint chevron</div>
    <div class="small">only true icon in source</div>
  </div>
</body></html>
