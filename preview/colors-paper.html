<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--parchment); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .swatch { border-radius: 8px; padding: 14px 14px 12px; height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
  .hex { font-family: ui-monospace, monospace; font-size: 10.5px; opacity: 0.85; }
  .label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); margin: 0 0 10px; }
</style></head>
<body>
  <div class="label">Paper & Ink — the writing surface</div>
  <div class="row">
    <div class="swatch" style="background:#f4ede4;color:#2c1810;"><div class="name">Parchment</div><div class="hex">#f4ede4 · --parchment</div></div>
    <div class="swatch" style="background:#faf6f0;color:#2c1810;"><div class="name">Cream</div><div class="hex">#faf6f0 · --cream</div></div>
    <div class="swatch" style="background:#2c1810;color:#faf6f0;border-color:transparent;"><div class="name">Ink</div><div class="hex">#2c1810 · --ink</div></div>
    <div class="swatch" style="background:#7a6e62;color:#faf6f0;border-color:transparent;"><div class="name">Faded</div><div class="hex">#7a6e62 · --faded</div></div>
  </div>
</body></html>
